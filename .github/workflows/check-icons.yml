name: Check icons

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check registry
        run: node tools/check-registry.mjs

      - name: Generate lightweight exports
        run: node tools/generate-favicons.mjs
