name: Deploy to nitro.sterenna.fr

on:
  push:
    branches: [main]
    paths:
      - 'exports/**'
      - 'tools/gui/**'
      - 'icons.registry.json'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (rsync --dry-run, no actual transfer)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: deploy-nitro
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy icons → nitro.sterenna.fr
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── SSH ────────────────────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_KEY }}" > ~/.ssh/ovh_key
          chmod 600 ~/.ssh/ovh_key
          ssh-keyscan -H "${{ secrets.OVH_HOST }}" >> ~/.ssh/known_hosts

      # ── Dry-run guard ──────────────────────────────────────────────────────
      - name: Set rsync flags
        id: flags
        run: |
          DRY=''
          if [ "${{ github.event.inputs.dry_run }}" = 'true' ]; then
            DRY='--dry-run'
            echo '⚠️  DRY-RUN mode — no files will be transferred'
          fi
          echo "extra=$DRY" >> "$GITHUB_OUTPUT"

      # ── Ensure remote dirs exist ───────────────────────────────────────────
      - name: Ensure remote dirs
        run: |
          ssh -i ~/.ssh/ovh_key "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}" \
            "mkdir -p ~/nitro/icons/exports ~/nitro/icons/gui"

      # ── Deploy exports/ ────────────────────────────────────────────────────
      - name: Deploy exports/
        run: |
          rsync -avz --delete \
            ${{ steps.flags.outputs.extra }} \
            -e "ssh -i ~/.ssh/ovh_key" \
            exports/ \
            "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}:~/nitro/icons/exports/"

      # ── Deploy GUI ─────────────────────────────────────────────────────────
      - name: Deploy tools/gui/
        run: |
          rsync -avz --delete \
            ${{ steps.flags.outputs.extra }} \
            -e "ssh -i ~/.ssh/ovh_key" \
            tools/gui/ \
            "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}:~/nitro/icons/gui/"

      # ── Deploy registry ────────────────────────────────────────────────────
      - name: Deploy icons.registry.json
        run: |
          rsync -avz \
            ${{ steps.flags.outputs.extra }} \
            -e "ssh -i ~/.ssh/ovh_key" \
            icons.registry.json \
            "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}:~/nitro/icons/icons.registry.json"

      # ── Fix permissions ────────────────────────────────────────────────────
      - name: Fix permissions on server
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          ssh -i ~/.ssh/ovh_key "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}" \
            "find ~/nitro/icons -type f -exec chmod 644 {} \; && find ~/nitro/icons -type d -exec chmod 755 {} \;"

      # ── Summary ────────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo '## ✅ Deploy sterenna-icons → nitro.sterenna.fr' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Host** | ${{ secrets.OVH_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Path** | ~/nitro/icons/ |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dry-run** | ${{ github.event.inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
