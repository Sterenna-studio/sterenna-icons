<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
<title id="title">Botanica Obscura — Homunculus botanique ombré</title>
<desc id="desc">Emblème symétrique représentant un homunculus végétal dans une graine ouverte, avec ombrage subtil et motif central bleu plus complexe.</desc>
<defs>
  <linearGradient id="shellStroke" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#a8ea52"/>
    <stop offset=".55" stop-color="#7ec850"/>
    <stop offset="1" stop-color="#467d34"/>
  </linearGradient>
  <linearGradient id="leafMain" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#b5f056"/>
    <stop offset=".55" stop-color="#7ec850"/>
    <stop offset="1" stop-color="#3d742f"/>
  </linearGradient>
  <linearGradient id="leafDark" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#5ea33e"/>
    <stop offset="1" stop-color="#224a26"/>
  </linearGradient>
  <linearGradient id="coreGlow" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0c1a18"/>
    <stop offset=".5" stop-color="#08120d"/>
    <stop offset="1" stop-color="#040908"/>
  </linearGradient>
  <radialGradient id="orb" cx=".5" cy=".35" r=".7">
    <stop offset="0" stop-color="#9ffbff"/>
    <stop offset=".45" stop-color="#5fa5f5"/>
    <stop offset="1" stop-color="#1d5974"/>
  </radialGradient>
  <linearGradient id="eye" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#9ffbff"/>
    <stop offset=".5" stop-color="#5fa5f5"/>
    <stop offset="1" stop-color="#163d5a"/>
  </linearGradient>
  <linearGradient id="coreLine" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#9ffbff"/>
    <stop offset=".4" stop-color="#5fa5f5"/>
    <stop offset="1" stop-color="#2e79ac"/>
  </linearGradient>
</defs>

<g fill="none" stroke-linecap="round" stroke-linejoin="round">
